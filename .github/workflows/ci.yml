# .github/workflows/ci.yml
name: Sauce Demo Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install --with-deps chromium

      - name: Run tests
        run: |
          pytest tests/ \
            --alluredir=allure-results \
            --clean-alluredir \
            -v \
            --tb=short

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ github.run_number }}
          path: allure-results/
          retention-days: 7

  report:
    needs: test
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download Allure artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          merge-multiple: true
          path: allure-results

      - name: 📝 Generate environment.properties + executor.json
        run: |
          echo "🔍 Getting versions via pip..."
          
          # Playwright version через pip
          PLAYWRIGHT_VER=$(pip show playwright 2>/dev/null | grep Version | cut -d' ' -f2 || echo "unknown")
          
          # Pytest version через pip  
          PYTEST_VER=$(pip show pytest 2>/dev/null | grep Version | cut -d' ' -f2 || echo "unknown")
          
          # Python version
          PYTHON_VER=$(python --version 2>&1 | cut -d' ' -f2)
          
          echo "✅ Versions: Python=$PYTHON_VER, Playwright=$PLAYWRIGHT_VER, Pytest=$PYTEST_VER"
          
          # Создаём environment.properties
          cat > allure-results/environment.properties << EOF
          Python.version=${PYTHON_VER}
          OS.name=$(uname -s)
          OS.version=$(uname -r)
          Playwright.version=${PLAYWRIGHT_VER}
          Pytest.version=${PYTEST_VER}
          Repository=${{ github.repository }}
          Branch=${{ github.ref_name }}
          Run.Number=${{ github.run_number }}
          Run.ID=${{ github.run_id }}
          Triggered.by=${{ github.actor }}
          Workflow=${{ github.workflow }}
          Date=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          EOF
          
          # Создаём executor.json
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          REPORT_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/"
          
          cat > allure-results/executor.json << EOF
          {
            "name": "GitHub Actions",
            "type": "github-actions",
            "url": "${RUN_URL}",
            "buildOrder": ${{ github.run_number }},
            "buildName": "${{ github.workflow }} #${{ github.run_number }}",
            "buildUrl": "${RUN_URL}",
            "reportUrl": "${REPORT_URL}"
          }
          EOF
          
          echo "✅ Created environment.properties and executor.json"
          cat allure-results/environment.properties

      - name: 📋 Post Allure Report link to Summary
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        run: |
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          REPORT_URL="https://${REPO_OWNER}.github.io/${REPO_NAME}/reports/"
          RUN_NUMBER="${{ github.run_number }}"
          
          echo "## 📊 Allure Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[![Allure Report](https://img.shields.io/badge/📈_Allure-Report-blue?style=for-the-badge)](${REPORT_URL})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**🔗 Online Report**: <a href=\"${REPORT_URL}\" target=\"_blank\">${REPORT_URL}</a>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "💡 Вы можете скачать allure-отчёт **allure-report-${RUN_NUMBER}.zip** внизу в секции артефактов." >> $GITHUB_STEP_SUMMARY

      - name: Install Allure CLI
        run: |
          wget -q https://github.com/allure-framework/allure2/releases/download/2.39.0/allure-2.39.0.tgz
          tar -xf allure-2.39.0.tgz -C /tmp/
          echo "/tmp/allure-2.39.0/bin" >> $GITHUB_PATH

      - name: Generate Allure Report
        run: |
          allure generate allure-results -o allure-report --clean

      - name: 📦 Upload Allure Report (ZIP)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.run_number }}
          path: allure-report/
          retention-days: 30
          compression-level: 6

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          destination_dir: reports
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

      - name: 📋 Post Allure Report link to Summary
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        run: |
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          REPORT_URL="https://${REPO_OWNER}.github.io/${REPO_NAME}/reports/"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          RUN_NUMBER="${{ github.run_number }}"
          
          echo "## 📊 Allure Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[![Allure Report](https://img.shields.io/badge/📈_Allure-Report-blue?style=for-the-badge)](${REPORT_URL})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**🔗 Online Report**: <a href=\"${REPORT_URL}\" target=\"_blank\">${REPORT_URL}</a>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Download Report Archive" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔽 [**Download allure-report-${RUN_NUMBER}.zip**](${RUN_URL})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 💡 Click the link above → scroll to **Artifacts** section → download **allure-report-${RUN_NUMBER}**" >> $GITHUB_STEP_SUMMARY